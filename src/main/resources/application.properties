# ----------------------------------------------------------------
# BannerApp — console application configuration
# ----------------------------------------------------------------

# Disable Spring Boot's own ASCII-art startup banner so only our
# generated banner appears in the output.
spring.main.banner-mode=off

# Suppress the "Started BannerAppApplication in X.XXX seconds" line.
spring.main.log-startup-info=false

# Explicitly declare this is a non-web application so no embedded
# server is started (also true implicitly since spring-boot-starter-web
# is not on the classpath).
spring.main.web-application-type=none

# Keep console output clean: show only WARN and above from the
# framework; our own System.out calls handle all user-facing output.
logging.level.root=WARN
